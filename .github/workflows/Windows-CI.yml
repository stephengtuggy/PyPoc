name: Windows-CI
permissions:
  contents: read
  pull-requests: read

# Controls when the action will run.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_test:
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - preset-name: VS2022Win64-pie-enabled-debug-no-otel
            build-type: Debug
            os: windows-2022
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2022Win64-pie-enabled-release-no-otel
            build-type: Release
            os: windows-2022
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2022Win64-pie-enabled-RelWithDebInfo-no-otel
            build-type: RelWithDebInfo
            os: windows-2022
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2022Win64-pie-enabled-debug-fetch-use-otel
            build-type: Debug
            os: windows-2022
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2022Win64-pie-enabled-release-fetch-use-otel
            build-type: Release
            os: windows-2022
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2022Win64-pie-enabled-RelWithDebInfo-fetch-use-otel
            build-type: RelWithDebInfo
            os: windows-2022
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2026Win64-pie-enabled-debug-no-otel
            build-type: Debug
            os: windows-2025-vs2026
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2026Win64-pie-enabled-release-no-otel
            build-type: Release
            os: windows-2025-vs2026
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2026Win64-pie-enabled-RelWithDebInfo-no-otel
            build-type: RelWithDebInfo
            os: windows-2025-vs2026
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2026Win64-pie-enabled-debug-fetch-use-otel
            build-type: Debug
            os: windows-2025-vs2026
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2026Win64-pie-enabled-release-fetch-use-otel
            build-type: Release
            os: windows-2025-vs2026
            triplet: x64-win10
            python-version: 3.12.9
          - preset-name: VS2026Win64-pie-enabled-RelWithDebInfo-fetch-use-otel
            build-type: RelWithDebInfo
            os: windows-2025-vs2026
            triplet: x64-win10
            python-version: 3.12.9

    env:
      # Indicates the location of vcpkg
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_ASSET_SOURCES: ${{ github.workspace }}/vcpkgAssets
      X_VCPKG_ASSET_SOURCES: clear;x-azurl,file:///${{ github.workspace }}/vcpkgAssets,,readwrite
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/vcpkgBin,readwrite
      VCPKG_BUILD_TREES: ${{ github.workspace }}/vcpkgBuild
      VCPKG_INSTALL_OPTIONS: "--x-buildtrees-root=${{ github.workspace }}\\vcpkgBuild"
      VCPKG_INSTALLED_DIR: "${{ github.workspace }}/vcpkgInstalled"
      VCPKG_OVERLAY_PORTS: ${{ github.workspace }}/custom-triplets
      VCPKG_FEATURE_FLAGS: "manifests,registries"
      VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
      VCPKG_DEFAULT_HOST_TRIPLET: ${{ matrix.triplet }}

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
        # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Restore vcpkg cache
        id: cache-vcpkg-restore
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ github.workspace }}/vcpkgAssets
            ${{ github.workspace }}/vcpkgBCache
            ${{ github.workspace }}/vcpkgBin
            ${{ github.workspace }}/vcpkgBuild
          key: vcpkgCache-${{ github.repository_owner }}-${{ matrix.os }}-${{ matrix.triplet }}-${{ hashFiles('vcpkg.json') }}

      - name: Create directories on cache miss
        run: |
          mkdir -p ${{ github.workspace }}/vcpkgAssets
          mkdir -p ${{ github.workspace }}/vcpkgBCache
          mkdir -p ${{ github.workspace }}/vcpkgBin
          mkdir -p ${{ github.workspace }}/vcpkgBuild
        if: steps.cache-vcpkg-restore.outputs.cache-hit != 'true'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        id: vega-py-setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CMake
        uses: lukka/get-cmake@f5b8fbb4d77cec1acc5a5f9f0df4beffaf5d98d9 # v4.3.4

      - name: Install vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          binaryCachePath: "${{ github.workspace }}/vcpkgBCache"

      - name: Build the code
        run: |
          & "${{ github.workspace }}\\script\\build.ps1" -PresetName "${{ matrix.preset-name }}" -BuildType "${{ matrix.build-type }}"
        shell: pwsh

      - name: Look for the Boost.Python libraries
        run: |
          Get-ChildItem "${{ github.workspace }}/vcpkgInstalled/${{ matrix.triplet}}" -Recurse -Force -Filter 'libboost_*' -File

      - name: Run the built EXE
        run: |
          & "${{ github.workspace }}\\script\\test.ps1" -PresetName "${{ matrix.preset-name }}" -BuildType "${{ matrix.build-type }}"
        shell: pwsh

      - name: Save vcpkg cache
        id: cache-vcpkg-save
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ github.workspace }}/vcpkgAssets
            ${{ github.workspace }}/vcpkgBCache
            ${{ github.workspace }}/vcpkgBin
            ${{ github.workspace }}/vcpkgBuild
          key: ${{ steps.cache-vcpkg-restore.outputs.cache-primary-key }}
        if: steps.cache-vcpkg-restore.outputs.cache-hit != 'true'
